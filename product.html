<h1>Product Details</h1>

<div id="product-details"></div>

<script>

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

fetch("data/products.json")
.then(response => response.json())
.then(data => {

  const product = data.products.find(p => p.id === productId);

  const container = document.getElementById("product-details");

  let thumbnails = "";

  product.images.forEach(img => {
    thumbnails += `<img src="${img}" width="80" onclick="changeImage('${img}')">`;
  });

  container.innerHTML = `
  
    <h2>${product.name}</h2>

    <img id="main-image" src="${product.images[0]}" width="400">

    <div>${thumbnails}</div>

    <p>Price: ₹${product.price}</p>

    <p>${product.description}</p>

    <label>Size:</label>
    <select id="size-select">
      ${product.sizes.map(size => `<option>${size}</option>`).join("")}
    </select>

    <br><br>

    <button onclick="orderWhatsApp('${product.name}','${product.id}')">
      Order on WhatsApp
    </button>

  `;

});

function changeImage(img){
  document.getElementById("main-image").src = img;
}

function orderWhatsApp(name,id){

  const size = document.getElementById("size-select").value;

  const message =
  `Hello, I want to order ${name} (SKU: ${id}) Size: ${size}`;

  const url =
  "https://wa.me/919440741757?text=" + encodeURIComponent(message);

  window.open(url);

}

</script>
